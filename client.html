<style>

<style>
    body { font-family: 'Inter', sans-serif; background-color: #191c21; }
    h1, h2, h3, h4, h5, h6, .display { font-family: 'Manrope', sans-serif; }

<body class="min-h-screen text-on-surface antialiased overflow-hidden flex flex-col relative">
<main class="flex-grow flex flex-col items-center justify-center relative w-full h-full bg-on-surface overflow-hidden">
<div class="z-10 flex flex-col items-center justify-between w-full h-full px-6 py-12 md:py-8 max-w-lg mx-auto">
<div class="w-full text-center glass-panel rounded-xl p-4 shadow-[0_4px_30px_rgba(25,28,33,0.06)]">
<h1 class="font-headline font-bold text-lg text-primary tracking-tight">Scan Attendance</h1>
<p id="status-text" class="font-label text-sm text-on-surface-variant mt-1 tracking-wide">Position your personal QR code within the frame.</p>
</div>
<div class="relative w-full aspect-square max-w-[320px] rounded-xl overflow-hidden glass-panel flex items-center justify-center p-2 pulse-border shadow-[0_10px_40px_rgba(25,28,33,0.1)]">
<div id="reader" class="w-full h-full"></div>
<div id="scanner-overlay" class="absolute inset-2 border-2 border-primary/40 rounded-lg pointer-events-none flex items-center justify-center">
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<div id="scan-line" class="absolute w-full h-0.5 bg-primary-container shadow-[0_0_8px_rgba(0,95,184,0.8)] top-0 left-0 animate-scan"></div>
</div>
</div>
<div class="w-full flex flex-col gap-4 items-center">
<div id="connection-status" class="flex items-center gap-2 bg-surface-container-highest px-4 py-2 rounded-lg text-sm font-label text-on-surface">
<span class="material-symbols-outlined text-[18px] text-primary">sensors</span>
                    Ready to scan
                </div>
<button id="start-btn" onclick="startScanner()" class="w-full max-w-[240px] bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-semibold py-4 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">qr_code_scanner</span>
                    Start Camera
                </button>
</div>
</div>
</main>
<script>
    // Protocol Check
    if (window.location.protocol === 'file:') {
        alert("⚠️ CAMERA BLOCKED: Browsers block camera access for security when opening files directly. \n\nPlease run 'python3 -m http.server' and open http://localhost:8000/client.html instead.");
    }

    let html5QrCode;
    const statusText = document.getElementById('status-text');
    const connectionStatus = document.getElementById('connection-status');
    const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    async function startScanner() {
        if (html5QrCode) {
            try { await html5QrCode.stop(); } catch(e) {}
        }
        
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 } };
        
        const startBtn = document.getElementById('start-btn');
        if (startBtn) startBtn.style.display = 'none';

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                console.error(err);
                statusText.innerHTML = `<span class="text-error font-bold">Camera Error:</span> Please ensure you have granted camera permissions.`;
                if (startBtn) startBtn.style.display = 'flex';
                if (startBtn) startBtn.innerText = "Retry Camera";
            });
    }

    async function onScanSuccess(decodedText, decodedResult) {
        // Pause and provide immediate feedback
        html5QrCode.pause();
        beep.play().catch(() => {}); // Ignore if browser blocks auto-play audio
        
        document.getElementById('scanner-overlay').classList.add('bg-green-500/20');
        connectionStatus.innerHTML = `<span class="material-symbols-outlined text-[18px] text-yellow-500 animate-spin">sync</span> Syncing to Sheet...`;
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Use no-cors for Apps Script if needed, but JSON response won't be readable
                body: JSON.stringify({
                    action: 'markAttendance',
                    studentId: decodedText
                })
            });
            
            // Note: with no-cors we can't see the body, but we assume success if no error thrown
            showSuccess(decodedText);
            
        } catch (err) {
            console.error(err);
            showError("Connection Failed");
        }
        
        // Resume after cooldown
        setTimeout(() => {
            document.getElementById('scanner-overlay').classList.remove('bg-green-500/20');
            html5QrCode.resume();
            connectionStatus.innerHTML = `<span class="material-symbols-outlined text-[18px] text-primary">sensors</span> Ready to scan`;
            statusText.innerText = "Position your personal QR code within the frame.";
        }, 3000);
    }

    function showSuccess(id) {
        statusText.innerHTML = `<span class="text-green-600 font-extrabold">CHECKED IN</span><br><span class="text-xs font-mono">${id}</span>`;
        connectionStatus.innerHTML = `<span class="material-symbols-outlined text-[18px] text-green-500">check_circle</span> Success`;
    }

    function showError(msg) {
        statusText.innerHTML = `<span class="text-red-600 font-bold">Error:</span> ${msg}`;
        connectionStatus.innerHTML = `<span class="material-symbols-outlined text-[18px] text-red-500">error</span> Failed`;
    }

    // Auto-start on load
    window.addEventListener('load', () => {
        setTimeout(startScanner, 1000);
    });
</script>
<style>
    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }
    .animate-scan {
        animation: scan 2s linear infinite;
    }
</style>
