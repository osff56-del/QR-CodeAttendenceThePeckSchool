<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chronograph - Attendance History</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "primary": "#00488d",
                        "on-primary": "#ffffff",
                        "primary-container": "#005fb8",
                        "background": "#f9f9ff",
                        "on-surface": "#191c21",
                        "on-surface-variant": "#424752",
                        "surface": "#f9f9ff",
                        "surface-container-highest": "#e1e2ea",
                        "surface-container-low": "#f2f3fb",
                        "outline": "#727783"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    </style>
    <script src="config.js"></script>
</head>
<body class="bg-background text-on-surface font-body antialiased flex h-screen overflow-hidden">
    <!-- NavigationDrawer (Desktop) -->
    <aside class="hidden md:flex h-full w-72 flex-col p-4 bg-slate-50 border-r border-slate-100">
        <div class="flex items-center gap-4 mb-8 p-2">
            <h2 class="text-blue-800 font-manrope font-bold text-xl">Chronograph</h2>
        </div>
        <nav class="flex flex-col gap-2 font-inter text-sm font-medium">
            <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg" href="index.html">
                <span class="material-symbols-outlined">dashboard</span> Dashboard
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg" href="students.html">
                <span class="material-symbols-outlined">group</span> Students
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-100 rounded-lg" href="generator.html">
                <span class="material-symbols-outlined">qr_code_2</span> QR Generator
            </a>
            <a class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-700 font-bold rounded-lg" href="history.html">
                <span class="material-symbols-outlined fill">history</span> History
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto p-6 md:p-10 max-w-7xl mx-auto w-full">
        <div class="mb-8">
            <h1 class="text-4xl font-headline font-extrabold text-on-surface tracking-tight">Attendance Logs</h1>
            <p class="text-on-surface-variant">Full record of all institutional scans</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-lg">All Records</h3>
                <button onclick="clearHistory()" class="text-error text-sm font-bold flex items-center gap-1 hover:bg-error/5 px-3 py-1 rounded-lg transition-colors">
                    <span class="material-symbols-outlined text-sm">delete_sweep</span> Clear All
                </button>
            </div>
            <div id="history-list" class="divide-y divide-slate-50">
                <!-- Records injected here -->
            </div>
        </div>
    </main>

    <script>
        function loadHistory() {
            const data = DataStore.getData();
            const container = document.getElementById('history-list');
            
            const logs = [...data.attendance].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            if (logs.length === 0) {
                container.innerHTML = `<div class="p-20 text-center text-slate-400">No attendance records found.</div>`;
                return;
            }

            container.innerHTML = logs.map(log => {
                const student = data.students.find(s => s.id === log.studentid) || { name: 'Unknown', id: log.studentid };
                const date = new Date(log.timestamp);
                return `
                    <div class="p-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600">
                                ${student.name[0]}
                            </div>
                            <div>
                                <p class="font-bold">${student.name}</p>
                                <p class="text-xs text-slate-500">ID: ${student.id}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-medium text-sm">${date.toLocaleDateString()}</p>
                            <p class="text-xs text-slate-400">${date.toLocaleTimeString()}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function clearHistory() {
            if (confirm("Permanently delete all attendance history?")) {
                const data = DataStore.getData();
                data.attendance = [];
                DataStore.saveData(data);
                loadHistory();
            }
        }

        setTimeout(loadHistory, 500);
    </script>

    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/80 backdrop-blur-xl rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 scale-95 active:scale-90 transition-transform" href="client.html">
            <span class="material-symbols-outlined mb-1">qr_code_scanner</span>
            <span class="font-inter text-[10px] uppercase tracking-widest font-bold">Scan</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 scale-95 active:scale-90 transition-transform" href="index.html">
            <span class="material-symbols-outlined mb-1">analytics</span>
            <span class="font-inter text-[10px] uppercase tracking-widest font-bold">Admin</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-blue-600 scale-95 active:scale-90 transition-transform" href="students.html">
            <span class="material-symbols-outlined mb-1">format_list_bulleted</span>
            <span class="font-inter text-[10px] uppercase tracking-widest font-bold">Records</span>
        </a>
        <a class="flex flex-col items-center justify-center text-blue-700 bg-blue-50 rounded-xl px-3 py-1 scale-95 active:scale-90 transition-transform" href="history.html">
            <span class="material-symbols-outlined fill mb-1">history</span>
            <span class="font-inter text-[10px] uppercase tracking-widest font-bold">History</span>
        </a>
    </nav>
</body>
</html>
